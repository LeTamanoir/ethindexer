name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] || {
            echo "invalid semver tag: ${GITHUB_REF_NAME}"
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Get previous tag
        id: prev_tag
        run: |
          current_tag="${GITHUB_REF#refs/tags/}"
          prev_tag=$(git tag --sort=-creatordate | grep -v "^${current_tag}$" | head -n 1)
          echo "tag=$prev_tag" >> "$GITHUB_OUTPUT"

      - name: Build changelog
        id: changelog
        run: |
          prev="${{ steps.prev_tag.outputs.tag }}"
          current="${GITHUB_REF#refs/tags/}"
          {
            echo "changelog<<EOF"
            echo "## Commits"
            git log "${prev}..${current}" --pretty=format:"- %s (%h)"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes "${{ steps.changelog.outputs.changelog }}"
